<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Termo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Cabeçalho do jogo -->
  <header>
    <h1>TERMO</h1>
    <p class="subtitulo">Adivinhe a palavra de 5 letras em 6 tentativas</p>
  </header>

  <!-- Área principal -->
  <main>

    <!-- Grade de tentativas: 6 linhas x 5 colunas -->
    <div id="board"></div>

    <!-- Mensagem de status (venceu / perdeu / letra inválida) -->
    <div id="message"></div>

    <!-- Teclado virtual -->
    <div id="keyboard"></div>

  </main>

  <script src="App.js"></script>
</body>
</html>
