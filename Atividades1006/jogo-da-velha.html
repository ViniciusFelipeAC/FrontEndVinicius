<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jogo da Velha - React</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* ── Estilos do Jogo da Velha (seguindo o CSS da atividade) ── */
    .square {
      background: #fff;
      border: 1px solid #999;
      float: left;
      font-size: 24px;
      font-weight: bold;
      line-height: 34px;
      height: 34px;
      margin-right: -1px;
      margin-top: -1px;
      padding: 0;
      text-align: center;
      width: 34px;
      cursor: pointer;
    }

    .square:focus {
      outline: none;
    }

    .square.highlight {
      background: #fffb8f;
    }

    .board-row:after {
      clear: both;
      content: "";
      display: table;
    }

    .status {
      margin-bottom: 10px;
      font-weight: bold;
    }

    .game {
      display: flex;
      flex-direction: row;
      gap: 40px;
      background: #fff;
      border-radius: 8px;
      padding: 32px 40px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    }

    .game-board {
      min-width: 110px;
    }

    .game-info {
      min-width: 180px;
    }

    .game-info ol {
      padding-left: 1.2em;
    }

    .game-info li {
      margin-bottom: 4px;
    }

    .game-info button {
      background: none;
      border: 1px solid #999;
      border-radius: 4px;
      padding: 2px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .game-info button:hover {
      background: #f0f0f0;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React e Babel via CDN (mesmo conceito do CodePen com Babel) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    /* ─────────────────────────────────────────────
       Componente Square
       Recebe: value (string) e onSquareClick (função)
       Retorna: um <button> que exibe o valor
    ───────────────────────────────────────────── */
    function Square({ value, onSquareClick, highlight }) {
      return (
        <button
          className={"square" + (highlight ? " highlight" : "")}
          onClick={onSquareClick}
        >
          {value}
        </button>
      );
    }

    /* ─────────────────────────────────────────────
       Componente Board
       Recebe: xIsNext, squares, onPlay
       Controla os cliques e monta as 3 linhas do tabuleiro
    ───────────────────────────────────────────── */
    function Board({ xIsNext, squares, onPlay }) {

      function handleClick(i) {
        // Se já há vencedor ou a casa já está preenchida, ignora o clique
        if (calculateWinner(squares) || squares[i]) {
          return;
        }
        const nextSquares = squares.slice();
        if (xIsNext) {
          nextSquares[i] = "X";
        } else {
          nextSquares[i] = "O";
        }
        onPlay(nextSquares);
      }

      const winnerInfo = calculateWinner(squares);
      const winnerLine = winnerInfo ? winnerInfo.line : [];

      let status;
      if (winnerInfo) {
        status = "Vencedor: " + winnerInfo.winner;
      } else if (squares.every(Boolean)) {
        status = "Empate!";
      } else {
        status = "Próximo jogador: " + (xIsNext ? "X" : "O");
      }

      return (
        <>
          <div className="status">{status}</div>

          {/* Linha 1 */}
          <div className="board-row">
            <Square value={squares[0]} onSquareClick={() => handleClick(0)} highlight={winnerLine.includes(0)} />
            <Square value={squares[1]} onSquareClick={() => handleClick(1)} highlight={winnerLine.includes(1)} />
            <Square value={squares[2]} onSquareClick={() => handleClick(2)} highlight={winnerLine.includes(2)} />
          </div>

          {/* Linha 2 */}
          <div className="board-row">
            <Square value={squares[3]} onSquareClick={() => handleClick(3)} highlight={winnerLine.includes(3)} />
            <Square value={squares[4]} onSquareClick={() => handleClick(4)} highlight={winnerLine.includes(4)} />
            <Square value={squares[5]} onSquareClick={() => handleClick(5)} highlight={winnerLine.includes(5)} />
          </div>

          {/* Linha 3 */}
          <div className="board-row">
            <Square value={squares[6]} onSquareClick={() => handleClick(6)} highlight={winnerLine.includes(6)} />
            <Square value={squares[7]} onSquareClick={() => handleClick(7)} highlight={winnerLine.includes(7)} />
            <Square value={squares[8]} onSquareClick={() => handleClick(8)} highlight={winnerLine.includes(8)} />
          </div>
        </>
      );
    }

    /* ─────────────────────────────────────────────
       Componente Game (componente raiz)
       Gerencia o histórico de jogadas (history)
       e o índice atual (currentMove)
    ───────────────────────────────────────────── */
    function Game() {
      const [history, setHistory] = useState([Array(9).fill(null)]);
      const [currentMove, setCurrentMove] = useState(0);

      const xIsNext = currentMove % 2 === 0;
      const currentSquares = history[currentMove];

      function handlePlay(nextSquares) {
        const nextHistory = [...history.slice(0, currentMove + 1), nextSquares];
        setHistory(nextHistory);
        setCurrentMove(nextHistory.length - 1);
      }

      function jumpTo(nextMove) {
        setCurrentMove(nextMove);
      }

      // Monta a lista de botões para cada jogada no histórico
      const moves = history.map((squares, move) => {
        let description;
        if (move > 0) {
          description = "Ir para a jogada #" + move;
        } else {
          description = "Ir para o início";
        }
        return (
          <li key={move}>
            <button onClick={() => jumpTo(move)}>{description}</button>
          </li>
        );
      });

      return (
        <div className="game">
          <div className="game-board">
            <h2>Jogo da Velha</h2>
            <Board xIsNext={xIsNext} squares={currentSquares} onPlay={handlePlay} />
          </div>
          <div className="game-info">
            <h2>Histórico</h2>
            <ol>{moves}</ol>
          </div>
        </div>
      );
    }

    /* ─────────────────────────────────────────────
       Função auxiliar: calculateWinner
       Verifica todas as combinações vencedoras
       Retorna { winner, line } ou null
    ───────────────────────────────────────────── */
    function calculateWinner(squares) {
      const lines = [
        [0, 1, 2], // linha superior
        [3, 4, 5], // linha do meio
        [6, 7, 8], // linha inferior
        [0, 3, 6], // coluna esquerda
        [1, 4, 7], // coluna central
        [2, 5, 8], // coluna direita
        [0, 4, 8], // diagonal principal
        [2, 4, 6], // diagonal secundária
      ];
      for (let i = 0; i < lines.length; i++) {
        const [a, b, c] = lines[i];
        if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
          return { winner: squares[a], line: lines[i] };
        }
      }
      return null;
    }

    /* ─────────────────────────────────────────────
       Ponto de entrada: renderiza <Game /> na div#root
       Equivalente ao root.render() dos slides
    ───────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <React.StrictMode>
        <Game />
      </React.StrictMode>
    );
  </script>
</body>
</html>
